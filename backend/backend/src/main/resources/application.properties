spring.application.name=smart-campus-backend

# ---- Server ----
server.port=8080

# ---- Database (PostgreSQL) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/smart_campusdb
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ---- File Uploads ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=uploads

# ---- OAuth2 - Google ----
# Replace with your actual Google OAuth2 credentials from Google Cloud Console
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# ---- CORS & Redirect ----
app.cors.allowed-origins=http://localhost:5173
app.oauth2.redirect-uri=http://localhost:5173/auth/callback

# ---- Logging ----
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=WARN
